name: 'Replay git tags from another repository'
description: 'Find the lowest git tag in another repository not yet found in this repository and replay it'
author: 'ContainerCraft'
inputs:
  upstream_owner:
    description: 'Owner (user or organization) of the upstream GitHub repository'
    required: true
  upstream_repository:
    description: 'Name of the upstream GitHub repository'
    required: true
  client-id:
    description: 'Client ID of the GitHub App used to authenticate against the upstream repository.'
    required: true
  private-key:
    description: 'Private key of the GitHub App used to authenticate.'
    required: true
  installation-id:
    description: 'Installation ID of the GitHub App used to authenticate.'
    required: true
  minimum_version:
    description: 'Minimum version to consider when replaying tags.'
    required: true
outputs:
  nextTag:
    description: 'Name of the lowest SemVer (MAJOR.MINOR.BUILD) tag present upstream but missing locally, or an empty string when there is no missing tag to replay.'
runs:
  using: 'node24'
  main: 'dist/index.js'
